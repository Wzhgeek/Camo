<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗小黑风黑猫团子桌宠预览</title>
    <style>
        /* 干净温馨的背景 */
        body {
            margin: 0;
            padding: 0;
            background: #eef7f2; /* 淡淡的森林绿底色，很衬小黑 */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* 舞台区域 */
        .stage {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 罗小黑团子主体 */
        .tuanzi {
            position: relative;
            width: 135px;
            height: 125px;
            background: #1a1a1a; /* 罗小黑标志性的深夜黑 */
            border-radius: 50% 50% 46% 46% / 60% 60% 40% 40%; /* 打造上圆下平的猫团子感 */
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            /* 默认小黑式Q弹呼吸 */
            animation: xiaohei-breathe 3s infinite ease-in-out;
            transform-origin: bottom center;
        }

        /* 罗小黑的灵魂：巨大的猫耳 */
        .ear {
            position: absolute;
            top: -22px;
            width: 50px;
            height: 60px;
            background: #1a1a1a;
            border-radius: 80% 20% 55% 50% / 80% 20% 80% 40%;
            transform-origin: bottom center;
            transition: all 0.3s ease;
        }
        /* 左耳 */
        .ear.left {
            left: 2px;
            transform: rotate(-20deg);
        }
        /* 右耳镜像反转 */
        .ear.right {
            right: 2px;
            transform: scaleX(-1) rotate(-20deg);
        }

        /* 耳朵内廓（罗小黑耳朵里面是亮亮的翡翠绿，非常吸睛） */
        .ear::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 10px;
            width: 25px;
            height: 35px;
            background: #39b54a; /* 经典的翡翠绿内耳 */
            border-radius: 80% 20% 55% 50% / 80% 20% 80% 40%;
            opacity: 0.9;
        }

        /* 脸部容器（控制五官整体乱动） */
        .face {
            position: absolute;
            top: 45px;
            left: 15px;
            right: 15px;
            height: 50px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 亮闪闪的大眼睛 */
        .eyes {
            position: absolute;
            top: 0;
            left: 5px;
            right: 5px;
            display: flex;
            justify-content: space-between;
        }
        .eye {
            width: 32px;
            height: 32px;
            background: #ffffff;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }
        /* 大瞳孔 */
        .pupil {
            width: 18px;
            height: 18px;
            background: #1a1a1a;
            border-radius: 50%;
            position: relative;
            transition: all 0.2s ease;
        }
        /* 眼中高光 */
        .pupil::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
        }

        /* 小黑的标志性猫嘴（平常隐藏或极小） */
        .mouth {
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 12px;
            height: 6px;
            border-bottom: 2.5px solid #ffffff;
            border-radius: 0 0 50% 50%;
            transform: translateX(-50%);
            transition: all 0.2s ease;
            opacity: 0.8;
        }

        /* 细长灵活的小黑尾巴 */
        .tail {
            position: absolute;
            bottom: 12px;
            right: -22px;
            width: 35px;
            height: 12px;
            background: #1a1a1a;
            border-radius: 0 10px 10px 0;
            transform-origin: left center;
            animation: xiaohei-tail 2.5s infinite ease-in-out;
            z-index: -1;
            transition: all 0.4s ease;
        }

        /* 对话气泡 */
        .bubble {
            position: absolute;
            top: -45px;
            background: #222;
            color: #5fff7f; /* 绿字黑底气泡 */
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(5px) scale(0.9);
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            white-space: nowrap;
        }


        /* ==================== 罗小黑 5大经典动作动画 ==================== */

        /* 默认呆萌呼吸：带有一点上下Q弹的压缩感 */
        @keyframes xiaohei-breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05, 0.95); }
        }
        /* 尾巴日常闲适地摆动 */
        @keyframes xiaohei-tail {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(25deg); }
        }

        /* 动作 1：观察 (耳朵立起，眼神好奇地往两侧偷瞄) */
        .tuanzi.idle-observe .ear.left { transform: rotate(-10deg) scaleY(1.05); }
        .tuanzi.idle-observe .ear.right { transform: scaleX(-1) rotate(-10deg) scaleY(1.05); }
        .tuanzi.idle-observe .pupil {
            animation: observe-pupils 4s infinite steps(1);
        }
        @keyframes observe-pupils {
            0%, 100%, 20%, 80% { transform: translate(0, 0); }
            30%, 45% { transform: translate(-5px, -1px); } /* 瞅左边 */
            55%, 70% { transform: translate(5px, -1px); }  /* 瞅右边 */
        }

        /* 动作 2：清理 (小黑猫舔毛/开心地变成猫咪笑眼) */
        .tuanzi.idle-clean {
            animation: clean-shake 0.5s infinite ease-in-out;
        }
        .tuanzi.idle-clean .eye {
            background: transparent; /* 隐藏眼白 */
        }
        .tuanzi.idle-clean .pupil {
            width: 28px; height: 16px;
            background: transparent;
            border-top: 4px solid #ffffff; /* 用边框拼出眯眼笑线 */
            border-radius: 50% 50% 0 0;
            transform: translateY(8px);
        }
        .tuanzi.idle-clean .mouth {
            width: 14px; height: 10px;
            background: #ff527b; /* 吐出粉色小舌头 */
            border: none;
            border-radius: 50%;
        }
        @keyframes clean-shake {
            0%, 100% { transform: rotate(-4deg) scaleX(1.02); }
            50% { transform: rotate(4deg) scaleX(0.98); }
        }

        /* 动作 3：跳跃 (极其还原原作的“化成一团黑影砸下”的极限Q弹) */
        .tuanzi.idle-jump {
            animation: xiaohei-jump 1.6s infinite cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes xiaohei-jump {
            0%, 100%, 85% { transform: translateY(0) scale(1); }
            15% { transform: translateY(6px) scale(1.2, 0.8); }    /* 极度压扁蓄力 */
            35% { transform: translateY(-55px) scale(0.85, 1.2); } /* 纵向拉长飞天 */
            50% { transform: translateY(0) scale(1.15, 0.85); }   /* 落地瞬间砸扁 */
            65% { transform: translateY(-6px) scale(0.95, 1.05); } /* 微小二次回弹 */
        }

        /* 动作 4：趴下 (小黑液体化，耳朵耷拉，露出招牌呆滞死鱼眼) */
        .tuanzi.idle-lay {
            height: 75px;
            border-radius: 50% 50% 30% 30% / 70% 70% 30% 30%;
            transform: translateY(45px);
            animation: lay-breathe 3s infinite ease-in-out;
        }
        .tuanzi.idle-lay .ear.left { transform: rotate(-45deg) translateY(5px); }
        .tuanzi.idle-lay .ear.right { transform: scaleX(-1) rotate(-45deg) translateY(5px); }
        .tuanzi.idle-lay .face { top: 15px; }
        .tuanzi.idle-lay .eye { height: 16px; border-radius: 16px 16px 0 0; transform: translateY(6px); } /* 半睁眼 */
        .tuanzi.idle-lay .pupil { width: 10px; height: 10px; }
        @keyframes lay-breathe {
            0%, 100% { transform: translateY(45px) scale(1); }
            50% { transform: translateY(45px) scale(1.04, 0.96); }
        }

        /* 动作 5：尾巴环绕 (尾巴暴长，像小黑的‘嘿咻’能力一样把身体围住) */
        .tuanzi.idle-wrap .tail {
            right: 25px;
            bottom: -6px;
            width: 115px;
            height: 16px;
            border-radius: 12px;
            background: #121212;
            z-index: 3; /* 环绕到最前面 */
            transform: rotate(-3deg);
            animation: tail-wrap-glow 2s infinite ease-in-out;
            box-shadow: 0 -3px 8px rgba(0,0,0,0.3);
        }
        @keyframes tail-wrap-glow {
            0%, 100% { transform: scale(1) rotate(-3deg); }
            50% { transform: scale(1.03) rotate(-1deg) translateX(-4px); }
        }

        /* 交互面板 */
        .panel {
            margin-top: 40px;
            background: #1a1a1a;
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        button {
            background: #2a2a2a;
            color: #999;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #333;
            color: #39b54a;
        }
        button.active {
            background: #39b54a;
            color: white;
            box-shadow: 0 0 12px rgba(57, 181, 74, 0.4);
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="bubble" id="bubble">喵~</div>
        
        <div class="tuanzi" id="tuanzi">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="face">
                <div class="eyes">
                    <div class="eye"><div class="pupil"></div></div>
                    <div class="eye"><div class="pupil"></div></div>
                </div>
                <div class="mouth"></div>
            </div>
            <div class="tail"></div>
        </div>
    </div>

    <div class="panel">
        <button class="active" onclick="triggerAction('', '……（发呆中）', this)">默认小黑</button>
        <button onclick="triggerAction('idle-observe', '左右张望：发现奇怪的Bug…', this)">1-观察</button>
        <button onclick="triggerAction('idle-clean', '嘿咻嘿咻！洗个脸~', this)">2-清理</button>
        <button onclick="triggerAction('idle-jump', '走你！Q弹起飞！', this)">3-跳跃</button>
        <button onclick="triggerAction('idle-lay', '流体猫咪已融化…（趴下）', this)">4-趴下</button>
        <button onclick="triggerAction('idle-wrap', '尾巴变长！御敌防御形态', this)">5-尾巴环绕</button>
    </div>

    <script>
        function triggerAction(actionName, text, btn) {
            const tuanzi = document.getElementById('tuanzi');
            const bubble = document.getElementById('bubble');
            
            // 归位
            tuanzi.className = 'tuanzi';
            
            // 触发状态
            if(actionName) {
                tuanzi.classList.add(actionName);
            }

            // 对话框动画
            bubble.innerText = text;
            bubble.style.opacity = '1';
            bubble.style.transform = 'translateY(0) scale(1)';
            
            setTimeout(() => {
                if(tuanzi.classList.contains(actionName) || (!actionName && tuanzi.className === 'tuanzi')) {
                    bubble.style.opacity = '0';
                    bubble.style.transform = 'translateY(5px) scale(0.9)';
                }
            }, 2000);

            // 切换高亮
            document.querySelectorAll('.panel button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
